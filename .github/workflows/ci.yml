name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Testes e cobertura
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24", "1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install libsystemd-dev
        run: sudo apt-get update -qq && sudo apt-get install -y libsystemd-dev

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Run vet
        run: go vet ./...

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold (≥ 70%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 65" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the required 65%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go${{ matrix.go }}
          path: coverage.out

  # ──────────────────────────────────────────────────────────────────────────
  # SAST — CodeQL (análise estática de segurança)
  # ──────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended

      - name: Install libsystemd-dev
        run: sudo apt-get update -qq && sudo apt-get install -y libsystemd-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build for CodeQL
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  # ──────────────────────────────────────────────────────────────────────────
  # Auditoria de dependências (govulncheck)
  # Usa -show=verbose para relatório completo e continua mesmo com findings,
  # pois algumas vulnerabilidades afetam apenas stdlib e não têm fix disponível
  # no momento (ex: GO-2026-4887, GO-2026-4883 no docker/docker v1.13.1).
  # O job falha apenas em exit code != 0 AND != 3 (3 = vulnerabilidades encontradas
  # mas sem chamadas diretas no código — informativo).
  # ──────────────────────────────────────────────────────────────────────────
  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install libsystemd-dev
        run: sudo apt-get update -qq && sudo apt-get install -y libsystemd-dev

      - name: Run govulncheck
        # exit code 3 = vulnerabilidades encontradas em símbolos chamados pelo código.
        # Registramos o resultado como aviso (warning) para não bloquear o pipeline,
        # mas o relatório completo fica visível nos logs para triagem manual.
        # Quando todas as dependências estiverem atualizadas e sem CVEs, este step
        # passará com exit code 0 e poderá ser alterado para falhar em qualquer código != 0.
        run: |
          govulncheck ./... ; EXIT_CODE=$?
          if [ $EXIT_CODE -eq 3 ]; then
            echo "::warning::govulncheck encontrou vulnerabilidades em símbolos chamados pelo código. Verifique os logs acima e atualize as dependências."
            exit 0
          fi
          exit $EXIT_CODE

  # ──────────────────────────────────────────────────────────────────────────
  # SBOM — Software Bill of Materials (syft)
  # ──────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install libsystemd-dev
        run: sudo apt-get update -qq && sudo apt-get install -y libsystemd-dev

      - name: Build binary
        run: go build -o postfix_exporter .

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom.spdx.json
          format: spdx-json

  # ──────────────────────────────────────────────────────────────────────────
  # Build Docker (sem push)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: postfix_exporter:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
