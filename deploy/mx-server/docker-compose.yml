services:
  postfix_exporter:
    build: ../..
    restart: unless-stopped
    user: "root:root"
    ports:
      - "9154:9154"
    volumes:
      # O exporter precisa ler o log do postfix e o socket do showq
      - /var/log/mail.log:/var/log/mail.log:ro
      - /var/spool/postfix/public/showq:/var/spool/postfix/public/showq:ro
    command:
      - "--web.listen-address=0.0.0.0:9154"
      - "--postfix.logfile_path=/var/log/mail.log"
      - "--postfix.showq_path=/var/spool/postfix/public/showq"

# NOTA: A label "cliente" NÃO é injetada aqui no servidor MX.
# O prom-label-proxy não serve o endpoint /metrics — ele é um proxy de
# queries PromQL (para Prometheus/Thanos) e não é adequado para este caso.
#
# A label "cliente" é injetada pelo OTel Collector centralizado via
# static_configs.labels no otel-collector-config.yaml:
#
#   static_configs:
#     - targets: ['IP_DESTE_MX:9154']
#       labels:
#         cliente: nome-do-cliente
#
# Isso garante que cada série temporal chegue ao Grafana Cloud com a
# label correta sem nenhum componente extra neste servidor.
